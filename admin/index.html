    <script>
        // 移动端侧边栏切换
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
            document.getElementById('mobile-sidebar-overlay').classList.remove('hidden');
            document.getElementById('mobile-sidebar').classList.remove('-translate-x-full');
        });
        
        document.getElementById('close-mobile-sidebar').addEventListener('click', function() {
            document.getElementById('mobile-sidebar-overlay').classList.add('hidden');
            document.getElementById('mobile-sidebar').classList.add('-translate-x-full');
        });
        
        document.getElementById('mobile-sidebar-overlay').addEventListener('click', function() {
            document.getElementById('mobile-sidebar-overlay').classList.add('hidden');
            document.getElementById('mobile-sidebar').classList.add('-translate-x-full');
        });
        
        // 退出登录
        document.getElementById('logout-button').addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        });
        
        // 头部退出登录
        document.getElementById('header-logout-button').addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        });
        
        // 用户下拉菜单
        document.getElementById('user-menu-button').addEventListener('click', function(e) {
            e.stopPropagation();
            const dropdown = document.getElementById('user-dropdown');
            dropdown.classList.toggle('hidden');
        });
        
        // 点击其他地方关闭下拉菜单
        document.addEventListener('click', function() {
            const dropdown = document.getElementById('user-dropdown');
            if (!dropdown.classList.contains('hidden')) {
                dropdown.classList.add('hidden');
            }
        });
        
        // 防止下拉菜单内部点击关闭
        document.getElementById('user-dropdown').addEventListener('click', function(e) {
            e.stopPropagation();
        });
        
        // 验证用户登录状态
        function checkUserLogin() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser) {
                window.location.href = 'login.html';
                return false;
            }
            
            // 更新用户信息显示
            document.getElementById('user-name').textContent = currentUser.name;
            document.getElementById('user-role').textContent = currentUser.role === 'admin' ? '系统管理员' : '普通工作人员';
            document.getElementById('user-initial').textContent = currentUser.name.charAt(0);
            
            document.getElementById('header-user-name').textContent = currentUser.name;
            document.getElementById('header-user-initial').textContent = currentUser.name.charAt(0);
            
            document.getElementById('mobile-user-name').textContent = currentUser.name;
            document.getElementById('mobile-user-role').textContent = currentUser.role === 'admin' ? '系统管理员' : '普通工作人员';
            document.getElementById('mobile-user-initial').textContent = currentUser.name.charAt(0);
            
            return true;
        }
        
        // 初始化页面数据
        function initPageData() {
            // 从本地存储获取投诉数据
            const complaints = JSON.parse(localStorage.getItem('complaints')) || [];
            
            // 如果没有数据，创建一些模拟数据
            if (complaints.length === 0) {
                createMockData();
                return;
            }
            
            // 更新统计数据
            updateStatistics(complaints);
            
            // 渲染图表
            renderCharts(complaints);
            
            // 显示最近投诉
            displayRecentComplaints(complaints);
        }

        // 更新统计数据
        function updateStatistics(complaints) {
            // 总投诉数
            const totalComplaints = complaints.length;
            document.getElementById('total-complaints').textContent = totalComplaints;
            
            // 待处理投诉数
            const pendingComplaints = complaints.filter(c => c.status === 'pending').length;
            document.getElementById('pending-complaints').textContent = pendingComplaints;
            
            // 已解决投诉数
            const resolvedComplaints = complaints.filter(c => c.status === 'resolved').length;
            document.getElementById('resolved-complaints').textContent = resolvedComplaints;
            
            // 计算百分比
            const pendingPercentage = totalComplaints > 0 ? Math.round((pendingComplaints / totalComplaints) * 100) : 0;
            document.getElementById('pending-percentage').textContent = pendingPercentage + '%';
            
            const resolvedPercentage = totalComplaints > 0 ? Math.round((resolvedComplaints / totalComplaints) * 100) : 0;
            document.getElementById('resolved-percentage').textContent = resolvedPercentage + '%';
            
            // 计算平均处理时间（仅对已解决的投诉）
            const resolvedComplaintsWithTime = complaints.filter(c => c.status === 'resolved' && c.processLogs.length > 1);
            let totalProcessingTime = 0;
            
            resolvedComplaintsWithTime.forEach(complaint => {
                const firstLog = complaint.processLogs[0];
                const lastLog = complaint.processLogs[complaint.processLogs.length - 1];
                
                const startTime = new Date(firstLog.timestamp).getTime();
                const endTime = new Date(lastLog.timestamp).getTime();
                
                // 计算处理时间（小时）
                const processingTime = (endTime - startTime) / (1000 * 60 * 60);
                totalProcessingTime += processingTime;
            });
            
            const avgProcessingTime = resolvedComplaintsWithTime.length > 0 ? Math.round(totalProcessingTime / resolvedComplaintsWithTime.length) : 0;
            document.getElementById('avg-processing-time').textContent = avgProcessingTime;
            
            // 模拟较上月数据
            document.getElementById('complaints-increase').textContent = '12%';
            document.getElementById('time-decrease').textContent = '-5%';
        }
        
        // 渲染图表
        function renderCharts(complaints) {
            // 投诉类型分布
            const typeCounts = {};
            complaints.forEach(complaint => {
                if (typeCounts[complaint.typeText]) {
                    typeCounts[complaint.typeText]++;
                } else {
                    typeCounts[complaint.typeText] = 1;
                }
            });
            
            const typeLabels = Object.keys(typeCounts);
            const typeData = Object.values(typeCounts);
            
            const typeChart = new Chart(
                document.getElementById('complaint-type-chart'),
                {
                    type: 'pie',
                    data: {
                        labels: typeLabels,
                        datasets: [{
                            data: typeData,
                            backgroundColor: [
                                '#3b82f6',
                                '#f59e0b',
                                '#10b981',
                                '#ef4444',
                                '#8b5cf6',
                                '#ec4899'
                            ],
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right'
                            }
                        }
                    }
                }
            );
            
            // 投诉趋势（最近7天）
            const now = new Date();
            const dateLabels = [];
            const dateData = [];
            
            for (let i = 6; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                
                const dateStr = date.toISOString().split('T')[0];
                dateLabels.push(dateStr.substring(5)); // 只显示月-日
                
                const dayComplaints = complaints.filter(c => {
                    const complaintDate = new Date(c.createdAt).toISOString().split('T')[0];
                    return complaintDate === dateStr;
                }).length;
                
                dateData.push(dayComplaints);
            }
            
            const trendChart = new Chart(
                document.getElementById('complaint-trend-chart'),
                {
                    type: 'line',
                    data: {
                        labels: dateLabels,
                        datasets: [{
                            label: '投诉数量',
                            data: dateData,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1
                                }
                            }
                        }
                    }
                }
            );
        }
        
        // 显示最近投诉
        function displayRecentComplaints(complaints) {
            const tableBody = document.getElementById('recent-complaints-table');
            
            // 清空表格
            tableBody.innerHTML = '';
            
            // 按时间排序，最近的在前
            const sortedComplaints = [...complaints].sort((a, b) => {
                return new Date(b.createdAt) - new Date(a.createdAt);
            });
            
            // 只显示最近5条
            const recentComplaints = sortedComplaints.slice(0, 5);
            
            if (recentComplaints.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="6" class="px-6 py-4 text-center text-gray-500">暂无投诉数据</td>';
                tableBody.appendChild(row);
                return;
            }
            
            recentComplaints.forEach(complaint => {
                const row = document.createElement('tr');
                
                // 格式化时间
                const createdAt = new Date(complaint.createdAt);
                const formattedDate = `${createdAt.getFullYear()}-${String(createdAt.getMonth() + 1).padStart(2, '0')}-${String(createdAt.getDate()).padStart(2, '0')} ${String(createdAt.getHours()).padStart(2, '0')}:${String(createdAt.getMinutes()).padStart(2, '0')}`;
                
                // 设置状态标签
                let statusClass = '';
                switch (complaint.status) {
                    case 'pending':
                        statusClass = 'status-pending';
                        break;
                    case 'processing':
                        statusClass = 'status-processing';
                        break;
                    case 'resolved':
                        statusClass = 'status-resolved';
                        break;
                    case 'rejected':
                        statusClass = 'status-rejected';
                        break;
                }
                
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${complaint.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 max-w-xs truncate" title="${complaint.title}">${complaint.title}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${complaint.typeText}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formattedDate}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="status-badge ${statusClass}">${complaint.statusText}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <a href="complaints.html?id=${complaint.id}" class="text-primary hover:text-blue-700">查看</a>
                    </td>
                `;
                
                tableBody.appendChild(row);
            });
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            if (checkUserLogin()) {
                initPageData();
            }
        });
    </script>
