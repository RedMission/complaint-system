                <h3 class="text-2xl font-bold text-gray-900">处理投诉</h3>

                </button>

            <form id="process-form">
                <input type="hidden" id="process-complaint-id">

                    <label for="process-status" class="block text-gray-700 font-medium mb-2">处理状态</label>
                    <select id="process-status" class="w-full px-4 py-2 border border-gray-300 rounded-lg form-input-focus" required>

                        <option value="resolved">已解决</option>

    <script>
        // 移动端侧边栏切换
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
            document.getElementById('mobile-sidebar-overlay').classList.remove('hidden');
            document.getElementById('mobile-sidebar').classList.remove('-translate-x-full');
        });
        
        document.getElementById('close-mobile-sidebar').addEventListener('click', function() {
            document.getElementById('mobile-sidebar-overlay').classList.add('hidden');
            document.getElementById('mobile-sidebar').classList.add('-translate-x-full');
        });
        
        document.getElementById('mobile-sidebar-overlay').addEventListener('click', function() {
            document.getElementById('mobile-sidebar-overlay').classList.add('hidden');
            document.getElementById('mobile-sidebar').classList.add('-translate-x-full');
        });
        
        // 退出登录
        document.getElementById('logout-button').addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        });
        
        // 头部退出登录
        document.getElementById('header-logout-button').addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        });
        
        // 用户下拉菜单
        document.getElementById('user-menu-button').addEventListener('click', function(e) {
            e.stopPropagation();
            const dropdown = document.getElementById('user-dropdown');
            dropdown.classList.toggle('hidden');
        });
        
        // 点击其他地方关闭下拉菜单
        document.addEventListener('click', function() {
            const dropdown = document.getElementById('user-dropdown');
            if (!dropdown.classList.contains('hidden')) {
                dropdown.classList.add('hidden');
            }
        });
        
        // 防止下拉菜单内部点击关闭
        document.getElementById('user-dropdown').addEventListener('click', function(e) {
            e.stopPropagation();
        });
        
        // 验证用户登录状态
        function checkUserLogin() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser) {
                window.location.href = 'login.html';
                return false;
            }
            
            // 更新用户信息显示
            document.getElementById('user-name').textContent = currentUser.name;
            document.getElementById('user-role').textContent = currentUser.role === 'admin' ? '系统管理员' : '普通工作人员';
            document.getElementById('user-initial').textContent = currentUser.name.charAt(0);
            
            document.getElementById('header-user-name').textContent = currentUser.name;
            document.getElementById('header-user-initial').textContent = currentUser.name.charAt(0);
            
            document.getElementById('mobile-user-name').textContent = currentUser.name;
            document.getElementById('mobile-user-role').textContent = currentUser.role === 'admin' ? '系统管理员' : '普通工作人员';
            document.getElementById('mobile-user-initial').textContent = currentUser.name.charAt(0);
            
            return true;
        }
        
        // 全局变量
        let complaints = [];
        let filteredComplaints = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        let selectedComplaintId = null;
        
        // 初始化页面
        async function initPage() {
            try {
                // 导入Firebase函数
                const { collection, getDocs } = await import("https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js");
                
                // 从Firebase Firestore获取投诉数据
                const complaintsCol = collection(db, 'complaints');
                const complaintsSnapshot = await getDocs(complaintsCol);
                complaints = complaintsSnapshot.docs.map(doc => doc.data());
                filteredComplaints = [...complaints];
            } catch (error) {
                console.error('获取投诉数据失败:', error);
                // 从本地存储获取投诉数据作为备份
                complaints = JSON.parse(localStorage.getItem('complaints')) || [];
                filteredComplaints = [...complaints];
            }
            
            // 渲染投诉列表
            renderComplaintsList();
            
            // 渲染分页
            renderPagination();
            
            // 更新统计信息
            updateStatistics();
        }
        
        // 渲染投诉列表
        function renderComplaintsList() {
            const tableBody = document.getElementById('complaints-table-body');
            tableBody.innerHTML = '';
            
            if (filteredComplaints.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="7" class="px-6 py-4 text-center text-gray-500">暂无投诉数据</td>';
                tableBody.appendChild(row);
                return;
            }
            
            // 计算当前页显示的数据范围
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, filteredComplaints.length);
            const pageComplaints = filteredComplaints.slice(startIndex, endIndex);
            
            // 更新显示范围
            document.getElementById('showing-start').textContent = startIndex + 1;
            document.getElementById('showing-end').textContent = endIndex;
            document.getElementById('total-count').textContent = filteredComplaints.length;
            
            // 渲染每一行数据
            pageComplaints.forEach(complaint => {
                const row = document.createElement('tr');
                
                // 格式化时间
                const createdAt = new Date(complaint.createdAt);
                const formattedDate = `${createdAt.getFullYear()}-${String(createdAt.getMonth() + 1).padStart(2, '0')}-${String(createdAt.getDate()).padStart(2, '0')} ${String(createdAt.getHours()).padStart(2, '0')}:${String(createdAt.getMinutes()).padStart(2, '0')}`;
                
                // 设置状态标签
                let statusClass = '';
                switch (complaint.status) {
                    case 'pending':
                        statusClass = 'status-pending';
                        break;
                    case 'processing':
                        statusClass = 'status-processing';
                        break;
                    case 'resolved':
                        statusClass = 'status-resolved';
                        break;
                    case 'rejected':
                        statusClass = 'status-rejected';
                        break;
                }
                
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <input type="checkbox" class="complaint-checkbox h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" value="${complaint.id}">
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${complaint.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 max-w-xs truncate" title="${complaint.title}">${complaint.title}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${complaint.typeText}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formattedDate}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="status-badge ${statusClass}">${complaint.statusText}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button class="text-primary hover:text-blue-700 view-complaint" data-id="${complaint.id}">查看</button>
                        ${complaint.status === 'pending' || complaint.status === 'processing' ? `<button class="text-green-600 hover:text-green-800 ml-3 process-complaint" data-id="${complaint.id}">处理</button>` : ''}
                    </td>
                `;
                
                tableBody.appendChild(row);
            });
            
            // 添加事件监听器
            document.querySelectorAll('.view-complaint').forEach(button => {
                button.addEventListener('click', function() {
                    const complaintId = this.getAttribute('data-id');
                    showComplaintDetail(complaintId);
                });
            });
            
            document.querySelectorAll('.process-complaint').forEach(button => {
                button.addEventListener('click', function() {
                    const complaintId = this.getAttribute('data-id');
                    showProcessModal(complaintId);
                });
            });
        }
        
        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(filteredComplaints.length / itemsPerPage);
            const paginationNumbers = document.getElementById('pagination-numbers');
            paginationNumbers.innerHTML = '';
            
            // 最多显示5个页码
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }
            
            for (let i = startPage; i <= endPage; i++) {
                const pageButton = document.createElement('button');
                pageButton.className = `relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium ${i === currentPage ? 'text-primary bg-blue-50' : 'text-gray-500 hover:bg-gray-50'}`;
                pageButton.textContent = i;
                pageButton.addEventListener('click', function() {
                    currentPage = i;
                    renderComplaintsList();
                    renderPagination();
                });
                paginationNumbers.appendChild(pageButton);
            }
            
            // 更新上一页/下一页按钮状态
            document.getElementById('prev-page').disabled = currentPage === 1;
            document.getElementById('prev-page').classList.toggle('opacity-50', currentPage === 1);
            document.getElementById('next-page').disabled = currentPage === totalPages;
            document.getElementById('next-page').classList.toggle('opacity-50', currentPage === totalPages);
            
            document.getElementById('prev-page-mobile').disabled = currentPage === 1;
            document.getElementById('prev-page-mobile').classList.toggle('opacity-50', currentPage === 1);
            document.getElementById('next-page-mobile').disabled = currentPage === totalPages;
            document.getElementById('next-page-mobile').classList.toggle('opacity-50', currentPage === totalPages);
        }
        
        // 更新统计信息
        function updateStatistics() {
            // 这里可以更新页面上的统计信息
            // 例如：各类状态的投诉数量等
        }
        
        // 筛选投诉
        function filterComplaints() {
            const statusFilter = document.getElementById('status-filter').value;
            const typeFilter = document.getElementById('type-filter').value;
            const dateFilter = document.getElementById('date-filter').value;
            const searchInput = document.getElementById('search-input').value.toLowerCase();
            const mobileSearch = document.getElementById('mobile-search').value.toLowerCase();
            
            // 合并搜索条件
            const searchTerm = searchInput || mobileSearch;
            
            filteredComplaints = complaints.filter(complaint => {
                // 状态筛选
                if (statusFilter && complaint.status !== statusFilter) {
                    return false;
                }
                
                // 类型筛选
                if (typeFilter && complaint.type !== typeFilter) {
                    return false;
                }
                
                // 日期筛选
                if (dateFilter) {
                    const complaintDate = new Date(complaint.createdAt);
                    const now = new Date();
                    
                    switch (dateFilter) {
                        case 'today':
                            if (complaintDate.toDateString() !== now.toDateString()) {
                                return false;
                            }
                            break;
                        case 'week':
                            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                            if (complaintDate < weekAgo) {
                                return false;
                            }
                            break;
                        case 'month':
                            const monthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                            if (complaintDate < monthAgo) {
                                return false;
                            }
                            break;
                        case 'quarter':
                            const quarterAgo = new Date(now.getTime() - 90 * 24 * 60 * 60 * 1000);
                            if (complaintDate < quarterAgo) {
                                return false;
                            }
                            break;
                    }
                }
                
                // 搜索筛选
                if (searchTerm) {
                    if (!complaint.id.toLowerCase().includes(searchTerm) && 
                        !complaint.title.toLowerCase().includes(searchTerm) &&
                        !complaint.description.toLowerCase().includes(searchTerm)) {
                        return false;
                    }
                }
                
                return true;
            });
            
            // 重置页码
            currentPage = 1;
            
            // 重新渲染列表和分页
            renderComplaintsList();
            renderPagination();
        }
        
        // 重置筛选
        function resetFilters() {
            document.getElementById('status-filter').value = '';
            document.getElementById('type-filter').value = '';
            document.getElementById('date-filter').value = '';
            document.getElementById('search-input').value = '';
            document.getElementById('mobile-search').value = '';
            
            filteredComplaints = [...complaints];
            currentPage = 1;
            
            renderComplaintsList();
            renderPagination();
        }
        
        // 显示投诉详情
        function showComplaintDetail(complaintId) {
            const complaint = complaints.find(c => c.id === complaintId);
            
            if (!complaint) return;
            
            const modal = document.getElementById('complaint-modal');
            const content = document.getElementById('complaint-detail-content');
            
            // 格式化时间
            const createdAt = new Date(complaint.createdAt);
            const formattedDate = `${createdAt.getFullYear()}-${String(createdAt.getMonth() + 1).padStart(2, '0')}-${String(createdAt.getDate()).padStart(2, '0')} ${String(createdAt.getHours()).padStart(2, '0')}:${String(createdAt.getMinutes()).padStart(2, '0')}`;
            
            // 设置状态标签
            let statusClass = '';
            switch (complaint.status) {
                case 'pending':
                    statusClass = 'status-pending';
                    break;
                case 'processing':
                    statusClass = 'status-processing';
                    break;
                case 'resolved':
                    statusClass = 'status-resolved';
                    break;
                case 'rejected':
                    statusClass = 'status-rejected';
                    break;
            }
            
            // 构建详情内容
            let detailHtml = `
                <div class="mb-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="text-xl font-bold text-gray-900">${complaint.title}</h4>
                            <div class="flex items-center mt-2">
                                <span class="status-badge ${statusClass}">${complaint.statusText}</span>
                                <span class="text-gray-500 text-sm ml-4">提交时间：${formattedDate}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-gray-600">投诉编号</p>
                            <p class="font-mono font-bold text-lg">${complaint.id}</p>
                        </div>
                    </div>
                </div>
                
                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <h5 class="text-lg font-semibold mb-3 text-gray-700">投诉内容</h5>
                        <p class="text-gray-600">${complaint.description}</p>
                    </div>
                    <div>
                        <h5 class="text-lg font-semibold mb-3 text-gray-700">投诉详情</h5>
                        <div class="space-y-3">
                            <div class="flex">
                                <span class="text-gray-500 w-20">投诉类型：</span>
                                <span class="font-medium">${complaint.typeText}</span>
                            </div>
                            <div class="flex">
                                <span class="text-gray-500 w-20">投诉地点：</span>
                                <span class="font-medium">${complaint.location}</span>
                            </div>
                            <div class="flex">
                                <span class="text-gray-500 w-20">联系人：</span>
                                <span class="font-medium">${complaint.contact.name}</span>
                            </div>
                            <div class="flex">
                                <span class="text-gray-500 w-20">联系电话：</span>
                                <span class="font-medium">${complaint.contact.phone}</span>
                            </div>
                            ${complaint.contact.email ? `
                                <div class="flex">
                                    <span class="text-gray-500 w-20">电子邮箱：</span>
                                    <span class="font-medium">${complaint.contact.email}</span>
                                </div>
                            ` : ''}
                            <div class="flex">
                                <span class="text-gray-500 w-20">上传文件：</span>
                                <span class="font-medium">${complaint.files}个文件</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                ${complaint.demand ? `
                    <div class="mb-6">
                        <h5 class="text-lg font-semibold mb-3 text-gray-700">投诉诉求</h5>
                        <p class="text-gray-600">${complaint.demand}</p>
                    </div>
                ` : ''}
                
                <div class="mb-6">
                    <h5 class="text-lg font-semibold mb-3 text-gray-700">处理进度</h5>
                    <div class="relative">
                        <!-- 时间轴线 -->
                        <div class="absolute left-0 top-0 bottom-0 w-0.5 bg-gray-200 ml-6"></div>
                        
                        <div class="space-y-6">
                `;
                
                // 添加处理进度记录
                complaint.processLogs.forEach((log, index) => {
                    const logDate = new Date(log.timestamp);
                    const formattedLogDate = `${logDate.getFullYear()}-${String(logDate.getMonth() + 1).padStart(2, '0')}-${String(logDate.getDate()).padStart(2, '0')} ${String(logDate.getHours()).padStart(2, '0')}:${String(logDate.getMinutes()).padStart(2, '0')}`;
                    
                    let logStatusClass = '';
                    let logIcon = '';
                    
                    switch (log.status) {
                        case 'pending':
                            logStatusClass = 'bg-yellow-100 text-yellow-800';
                            logIcon = 'fa-clock-o';
                            break;
                        case 'processing':
                            logStatusClass = 'bg-blue-100 text-blue-800';
                            logIcon = 'fa-spinner';
                            break;
                        case 'resolved':
                            logStatusClass = 'bg-green-100 text-green-800';
                            logIcon = 'fa-check';
                            break;
                        case 'rejected':
                            logStatusClass = 'bg-red-100 text-red-800';
                            logIcon = 'fa-times';
                            break;
                    }
                    
                    detailHtml += `
                        <div class="flex">
                            <div class="flex-shrink-0 w-12 h-12 rounded-full ${logStatusClass} flex items-center justify-center z-10">
                                <i class="fa ${logIcon}"></i>
                            </div>
                            <div class="ml-4">
                                <div class="flex items-center">
                                    <h6 class="font-medium text-gray-900">${log.statusText}</h6>
                                    <span class="text-gray-500 text-sm ml-2">${formattedLogDate}</span>
                                </div>
                                <p class="text-gray-600 mt-1">${log.comment}</p>
                            </div>
                        </div>
                    `;
                });
                
                detailHtml += `
                        </div>
                    </div>
                </div>
                
                <div class="flex justify-end">
                    ${(complaint.status === 'pending' || complaint.status === 'processing') ? `
                        <button class="bg-primary text-white font-medium py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-300 process-complaint-btn" data-id="${complaint.id}">
                            处理投诉
                        </button>
                    ` : ''}
                    <button class="ml-2 bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg hover:bg-gray-300 transition duration-300" id="close-detail-modal">
                        关闭
                    </button>
                </div>
            `;
            
            content.innerHTML = detailHtml;
            modal.classList.remove('hidden');
            
            // 添加事件监听器
            document.getElementById('close-detail-modal').addEventListener('click', function() {
                modal.classList.add('hidden');
            });
            
            const processBtn = content.querySelector('.process-complaint-btn');
            if (processBtn) {
                processBtn.addEventListener('click', function() {
                    const complaintId = this.getAttribute('data-id');
                    modal.classList.add('hidden');
                    showProcessModal(complaintId);
                });
            }
        }
        
        // 显示处理投诉弹窗
        function showProcessModal(complaintId) {
            const complaint = complaints.find(c => c.id === complaintId);
            
            if (!complaint) return;
            
            selectedComplaintId = complaintId;
            
            const modal = document.getElementById('process-modal');
            document.getElementById('process-complaint-id').value = complaintId;
            
            // 设置默认状态
            if (complaint.status === 'pending') {
                document.getElementById('process-status').value = 'processing';
            } else {
                document.getElementById('process-status').value = complaint.status;
            }
            
            document.getElementById('process-comment').value = '';
            
            modal.classList.remove('hidden');
        }
        
        // 处理投诉
        async function processComplaint(complaintId, status, comment) {
            const complaintIndex = complaints.findIndex(c => c.id === complaintId);
            
            if (complaintIndex === -1) return;
            
            // 导入Firebase函数
            const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js");
            
            // 更新投诉状态
            const statusTextMap = {
                'pending': '待处理',
                'processing': '处理中',
                'resolved': '已解决',
                'rejected': '已驳回'
            };
            
            const updatedComplaint = {
                ...complaints[complaintIndex],
                status: status,
                statusText: statusTextMap[status],
                updatedAt: new Date().toISOString(),
                processLogs: [...complaints[complaintIndex].processLogs, {
                    status: status,
                    statusText: statusTextMap[status],
                    timestamp: new Date().toISOString(),
                    comment: comment
                }]
            };
            
            try {
                // 保存到Firebase Firestore
                await setDoc(doc(db, 'complaints', complaintId), updatedComplaint);
                
                // 更新本地数据
                complaints[complaintIndex] = updatedComplaint;
                
                // 保存到本地存储作为备份
                localStorage.setItem('complaints', JSON.stringify(complaints));
                
                // 更新筛选后的投诉列表
                const filteredIndex = filteredComplaints.findIndex(c => c.id === complaintId);
                if (filteredIndex !== -1) {
                    filteredComplaints[filteredIndex] = {...updatedComplaint};
                }
                
                // 重新渲染列表
                renderComplaintsList();
                
                // 关闭弹窗
                document.getElementById('process-modal').classList.add('hidden');
                
                alert('投诉处理成功');
            } catch (error) {
                console.error('处理投诉失败:', error);
                // 仅更新本地存储
                complaints[complaintIndex] = updatedComplaint;
                localStorage.setItem('complaints', JSON.stringify(complaints));
                
                // 更新筛选后的投诉列表
                const filteredIndex = filteredComplaints.findIndex(c => c.id === complaintId);
                if (filteredIndex !== -1) {
                    filteredComplaints[filteredIndex] = {...updatedComplaint};
                }
                
                // 重新渲染列表
                renderComplaintsList();
                
                // 关闭弹窗
                document.getElementById('process-modal').classList.add('hidden');
                
                alert('网络连接失败，处理结果已保存到本地，稍后会自动同步');
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', async function() {
            if (checkUserLogin()) {
                await initPage();
                
                // 添加事件监听器
                document.getElementById('filter-button').addEventListener('click', filterComplaints);
                document.getElementById('reset-filter-button').addEventListener('click', resetFilters);
                
                document.getElementById('search-input').addEventListener('keyup', function(e) {
                    if (e.key === 'Enter') {
                        filterComplaints();
                    }
                });
                
                document.getElementById('mobile-search').addEventListener('keyup', function(e) {
                    if (e.key === 'Enter') {
                        filterComplaints();
                    }
                });
                
                // 分页按钮
                document.getElementById('prev-page').addEventListener('click', function() {
                    if (currentPage > 1) {
                        currentPage--;
                        renderComplaintsList();
                        renderPagination();
                    }
                });
                
                document.getElementById('next-page').addEventListener('click', function() {
                    const totalPages = Math.ceil(filteredComplaints.length / itemsPerPage);
                    if (currentPage < totalPages) {
                        currentPage++;
                        renderComplaintsList();
                        renderPagination();
                    }
                });
                
                document.getElementById('prev-page-mobile').addEventListener('click', function() {
                    if (currentPage > 1) {
                        currentPage--;
                        renderComplaintsList();
                        renderPagination();
                    }
                });
                
                document.getElementById('next-page-mobile').addEventListener('click', function() {
                    const totalPages = Math.ceil(filteredComplaints.length / itemsPerPage);
                    if (currentPage < totalPages) {
                        currentPage++;
                        renderComplaintsList();
                        renderPagination();
                    }
                });
                
                // 全选/取消全选
                document.getElementById('select-all').addEventListener('change', function() {
                    const checkboxes = document.querySelectorAll('.complaint-checkbox');
                    checkboxes.forEach(checkbox => {
                        checkbox.checked = this.checked;
                    });
                });
                
                // 关闭弹窗
                document.getElementById('close-modal').addEventListener('click', function() {
                    document.getElementById('complaint-modal').classList.add('hidden');
                });
                
                document.getElementById('modal-overlay').addEventListener('click', function() {
                    document.getElementById('complaint-modal').classList.add('hidden');
                });
                
                document.getElementById('close-process-modal').addEventListener('click', function() {
                    document.getElementById('process-modal').classList.add('hidden');
                });
                
                document.getElementById('process-modal-overlay').addEventListener('click', function() {
                    document.getElementById('process-modal').classList.add('hidden');
                });
                
                document.getElementById('cancel-process').addEventListener('click', function() {
                    document.getElementById('process-modal').classList.add('hidden');
                });
                
                // 处理投诉表单提交
                document.getElementById('process-form').addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const complaintId = document.getElementById('process-complaint-id').value;
                    const status = document.getElementById('process-status').value;
                    const comment = document.getElementById('process-comment').value.trim();
                    
                    if (!comment) {
                        alert('请输入处理意见');
                        return;
                    }
                    
                    await processComplaint(complaintId, status, comment);
                });
            }
        });
    </script>
</body>
