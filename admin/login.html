<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 两江新区欠薪投诉举报平台</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#3b82f6',
                        accent: '#60a5fa',
                        light: '#f3f4f6',
                        dark: '#1f2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .form-input-focus {
                @apply focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none;
            }
            .bg-gradient-primary {
                @apply bg-gradient-to-r from-primary to-secondary;
            }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- 登录卡片 -->
        <div class="bg-white rounded-lg shadow-xl overflow-hidden">
            <!-- 顶部蓝色区域 -->
            <div class="bg-gradient-primary py-6 px-8 text-white text-center">
                <div class="flex justify-center mb-4">
                    <i class="fa fa-gavel text-4xl"></i>
                </div>
                <h1 class="text-2xl font-bold">工作人员登录</h1>
                <p class="mt-1 text-blue-100">两江新区欠薪投诉举报平台后台管理系统</p>
            </div>
            
            <!-- 登录表单 -->
            <div class="p-8">
                <form id="login-form">
                    <div class="mb-6">
                        <label for="username" class="block text-gray-700 font-medium mb-2">用户名</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa fa-user text-gray-400"></i>
                            </div>
                            <input type="text" id="username" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg form-input-focus" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <label for="password" class="block text-gray-700 font-medium mb-2">密码</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa fa-lock text-gray-400"></i>
                            </div>
                            <input type="password" id="password" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg form-input-focus" placeholder="请输入密码" required>
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <button type="button" id="toggle-password" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                                    <i class="fa fa-eye-slash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center">
                            <input id="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                            <label for="remember-me" class="ml-2 block text-sm text-gray-700">记住我</label>
                        </div>
                        <a href="#" class="text-sm text-primary hover:text-blue-700">忘记密码？</a>
                    </div>
                    
                    <button type="submit" class="w-full bg-gradient-primary text-white font-medium py-2 px-4 rounded-lg hover:opacity-90 transition duration-300 flex items-center justify-center">
                        <i class="fa fa-sign-in mr-2"></i> 登录
                    </button>
                </form>
            </div>
        </div>
        
        <!-- 页脚 -->
        <div class="mt-6 text-center text-gray-500 text-sm">
            <p>&copy; 2026 两江新区欠薪投诉举报平台 版权所有</p>
        </div>
    </div>

    <script>
        // 切换密码可见性
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        });
        
        // 登录表单提交
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const rememberMe = document.getElementById('remember-me').checked;
            
            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }
            
            // 模拟登录验证（实际应用中应通过API验证）
            // 这里使用预设的管理员账号
            if (username === 'admin' && password === 'admin123') {
                // 保存登录状态
                const user = {
                    username: username,
                    role: 'admin',
                    name: '管理员'
                };
                
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                if (rememberMe) {
                    localStorage.setItem('rememberedUser', username);
                } else {
                    localStorage.removeItem('rememberedUser');
                }
                
                // 跳转到后台首页
                window.location.href = 'index.html';
            } else {
                alert('用户名或密码错误');
            }
        });
        
        // 自动填充记住的用户名
        document.addEventListener('DOMContentLoaded', function() {
            const rememberedUser = localStorage.getItem('rememberedUser');
            if (rememberedUser) {
                document.getElementById('username').value = rememberedUser;
                document.getElementById('remember-me').checked = true;
            }
        });
    </script>
</body>
</html>
