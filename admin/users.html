<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS v3 -->

    <!-- Font Awesome -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#3b82f6',
                        accent: '#60a5fa',
                        light: '#f3f4f6',
                        dark: '#1f2937',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444'

                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']

        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .sidebar-active {

</head>
<body class="bg-gray-100 font-sans">

                <!-- 导航菜单 -->

                        <li class="mb-1">

                                <span class="ml-2">数据概览</span>

                        <li class="mb-1">
                            <a href="complaints.html" class="flex items-center px-4 py-3 text-blue-100 hover:bg-blue-700 transition-colors duration-200">
                                <i class="fa fa-list-alt w-6 text-center"></i>
                                <span class="ml-2">投诉管理</span>
                            </a>
                        </li>
                        <li class="mb-1">
                            <a href="categories.html" class="flex items-center px-4 py-3 text-blue-100 hover:bg-blue-700 transition-colors duration-200">
                                <i class="fa fa-tags w-6 text-center"></i>
                                <span class="ml-2">分类管理</span>

                        <i class="fa fa-sign-out w-6 text-center"></i>
                        <span class="ml-2">退出登录</span>
                    </button>
                </div>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- 顶部导航栏 -->
            <header class="bg-white shadow-sm z-10">
                <div class="flex items-center justify-between h-16 px-6">
                    <!-- 移动端菜单按钮 -->
                    <button class="md:hidden text-gray-500 focus:outline-none" id="mobile-menu-button">

                    </button>
                    
                    <!-- 搜索框 -->
                    <div class="hidden md:block flex-1 max-w-md ml-8">

                            <input type="text" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none" placeholder="搜索用户...">
                        </div>
                    </div>
                    
                    <!-- 右侧工具栏 -->
                    <div class="flex items-center space-x-4">
                        <button class="text-gray-500 hover:text-gray-700 focus:outline-none relative">

                            <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
                        </button>
                        <button class="text-gray-500 hover:text-gray-700 focus:outline-none">
                            <i class="fa fa-envelope text-xl"></i>
                        </button>
                        <div class="border-l pl-4 border-gray-300 relative">
                            <button class="flex items-center text-gray-700 hover:text-gray-900 focus:outline-none" id="user-menu-button">
                                <span class="mr-2 hidden md:block" id="header-user-name">管理员</span>
                                <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white font-bold">
                                    <span id="header-user-initial">管</span>
                                </div>
                                <i class="fa fa-chevron-down ml-2 text-xs text-gray-500"></i>
                            </button>
                            <!-- 用户下拉菜单 -->
                            <div class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 hidden z-50" id="user-dropdown">
                                <a href="users.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">用户管理</a>
                                <div class="border-t border-gray-100"></div>
                                <button id="header-logout-button" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">退出登录</button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- 移动端侧边栏 -->
            <div class="fixed inset-0 bg-gray-600 bg-opacity-75 z-40 hidden" id="mobile-sidebar-overlay">
                <div class="fixed inset-y-0 left-0 w-64 bg-primary z-50 transform transition-transform duration-300 -translate-x-full" id="mobile-sidebar">
                    <!-- 移动端侧边栏内容 -->
                    <div class="flex items-center justify-between h-16 border-b border-blue-700 px-4">
                        <div class="flex items-center space-x-2">
                            <i class="fa fa-gavel text-white text-2xl"></i>
                            <span class="text-white text-xl font-bold">投诉平台管理</span>
                        </div>
                        <button class="text-white focus:outline-none" id="close-mobile-sidebar">
                            <i class="fa fa-times text-xl"></i>
                        </button>
                    </div>
                    
                    <!-- 用户信息 -->
                    <div class="p-4 border-b border-blue-700">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-primary font-bold">
                                <span id="mobile-user-initial">管</span>
                            </div>
                            <div>
                                <p class="text-white font-medium" id="mobile-user-name">管理员</p>
                                <p class="text-blue-200 text-xs" id="mobile-user-role">系统管理员</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 导航菜单 -->
                    <nav class="py-4">
                        <ul>
                            <li class="mb-1">
                                <a href="index.html" class="flex items-center px-4 py-3 text-blue-100 hover:bg-blue-700 transition-colors duration-200">
                                    <i class="fa fa-dashboard w-6 text-center"></i>
                                    <span class="ml-2">数据概览</span>
                                </a>
                            </li>
                            <li class="mb-1">
                                <a href="complaints.html" class="flex items-center px-4 py-3 text-blue-100 hover:bg-blue-700 transition-colors duration-200">
                                    <i class="fa fa-list-alt w-6 text-center"></i>
                                    <span class="ml-2">投诉管理</span>
                                </a>
                            </li>
                            <li class="mb-1">
                                <a href="categories.html" class="flex items-center px-4 py-3 text-blue-100 hover:bg-blue-700 transition-colors duration-200">
                                    <i class="fa fa-tags w-6 text-center"></i>
                                    <span class="ml-2">分类管理</span>
                                </a>
                            </li>
                            <li class="mb-1">
                                <a href="users.html" class="flex items-center px-4 py-3 sidebar-active">
                                    <i class="fa fa-users w-6 text-center"></i>
                                    <span class="ml-2">用户管理</span>
                                </a>
                            </li>
                            <li class="mb-1">
                                <a href="settings.html" class="flex items-center px-4 py-3 text-blue-100 hover:bg-blue-700 transition-colors duration-200">
                                    <i class="fa fa-cog w-6 text-center"></i>
                                    <span class="ml-2">系统设置</span>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
            
            <!-- 主要内容 -->
            <main class="flex-1 overflow-y-auto p-6">
                <div class="mb-6">
                    <h1 class="text-2xl font-bold text-gray-800">用户管理</h1>
                    <p class="text-gray-600">管理系统用户，包括添加、编辑和设置权限</p>
                </div>
                
                <!-- 操作按钮 -->
                <div class="flex justify-between items-center mb-6">
                    <button id="add-user-button" class="bg-primary text-white font-medium py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-300 flex items-center">
                        <i class="fa fa-plus mr-2"></i> 添加用户
                    </button>
                </div>
                
                <!-- 用户列表 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead>
                                <tr>
                                    <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                                    <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户名</th>
                                    <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">姓名</th>
                                    <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">角色</th>
                                    <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                    <th class="px-6 py-3 bg-gray-50 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200" id="users-table">
                                <!-- 用户数据将通过JavaScript动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- 添加/编辑用户弹窗 -->
    <div class="fixed inset-0 flex items-center justify-center z-50 hidden" id="user-modal">
        <div class="absolute inset-0 bg-black bg-opacity-50" id="modal-overlay"></div>
        <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full relative z-10">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-900" id="modal-title">添加用户</h3>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <form id="user-form">
                <input type="hidden" id="user-id" name="user-id">
                <div class="mb-4">
                    <label for="user-username" class="block text-gray-700 font-medium mb-2">用户名 <span class="text-red-500">*</span></label>
                    <input type="text" id="user-username" name="user-username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none" placeholder="请输入用户名" required>
                </div>
                <div class="mb-4">
                    <label for="user-name" class="block text-gray-700 font-medium mb-2">姓名 <span class="text-red-500">*</span></label>
                    <input type="text" id="user-name" name="user-name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none" placeholder="请输入姓名" required>
                </div>
                <div class="mb-4">
                    <label for="user-password" class="block text-gray-700 font-medium mb-2">密码 <span class="text-red-500">*</span></label>
                    <input type="password" id="user-password" name="user-password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none" placeholder="请输入密码" required>
                    <p class="text-gray-500 text-sm mt-1" id="password-hint">密码长度至少6位</p>
                </div>
                <div class="mb-6">
                    <label for="user-role" class="block text-gray-700 font-medium mb-2">角色 <span class="text-red-500">*</span></label>
                    <select id="user-role" name="user-role" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none" required>
                        <option value="admin">系统管理员</option>
                        <option value="staff">普通工作人员</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" id="cancel-button" class="bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg hover:bg-gray-300 transition duration-300">
                        取消
                    </button>
                    <button type="submit" class="bg-primary text-white font-medium py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-300">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 移动端侧边栏切换
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
            document.getElementById('mobile-sidebar-overlay').classList.remove('hidden');
            document.getElementById('mobile-sidebar').classList.remove('-translate-x-full');
        });
        
        document.getElementById('close-mobile-sidebar').addEventListener('click', function() {
            document.getElementById('mobile-sidebar-overlay').classList.add('hidden');
            document.getElementById('mobile-sidebar').classList.add('-translate-x-full');
        });
        
        document.getElementById('mobile-sidebar-overlay').addEventListener('click', function() {
            document.getElementById('mobile-sidebar-overlay').classList.add('hidden');
            document.getElementById('mobile-sidebar').classList.add('-translate-x-full');
        });
        
        // 退出登录
        document.getElementById('logout-button').addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        });
        
        // 头部退出登录
        document.getElementById('header-logout-button').addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        });
        
        // 用户下拉菜单
        document.getElementById('user-menu-button').addEventListener('click', function(e) {
            e.stopPropagation();
            const dropdown = document.getElementById('user-dropdown');
            dropdown.classList.toggle('hidden');
        });
        
        // 点击其他地方关闭下拉菜单
        document.addEventListener('click', function() {
            const dropdown = document.getElementById('user-dropdown');
            if (!dropdown.classList.contains('hidden')) {
                dropdown.classList.add('hidden');
            }
        });
        
        // 防止下拉菜单内部点击关闭
        document.getElementById('user-dropdown').addEventListener('click', function(e) {
            e.stopPropagation();
        });
        
        // 验证用户登录状态
        function checkUserLogin() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser) {
                window.location.href = 'login.html';
                return false;
            }
            
            // 更新用户信息显示
            document.getElementById('user-name').textContent = currentUser.name;
            document.getElementById('user-role').textContent = currentUser.role === 'admin' ? '系统管理员' : '普通工作人员';
            document.getElementById('user-initial').textContent = currentUser.name.charAt(0);
            
            document.getElementById('header-user-name').textContent = currentUser.name;
            document.getElementById('header-user-initial').textContent = currentUser.name.charAt(0);
            
            document.getElementById('mobile-user-name').textContent = currentUser.name;
            document.getElementById('mobile-user-role').textContent = currentUser.role === 'admin' ? '系统管理员' : '普通工作人员';
            document.getElementById('mobile-user-initial').textContent = currentUser.name.charAt(0);
            
            return true;
        }
        
        // 初始化用户数据
        function initUsers() {
            // 从本地存储获取用户数据
            let users = JSON.parse(localStorage.getItem('users')) || [];
            
            // 如果没有用户数据，创建默认管理员用户
            if (users.length === 0) {
                users = [
                    {
                        id: 1,
                        username: 'admin',
                        name: '管理员',
                        password: 'admin123', // 实际应用中应该加密存储
                        role: 'admin',
                        status: 'active'
                    }
                ];
                localStorage.setItem('users', JSON.stringify(users));
            }
            
            // 渲染用户列表
            renderUsers(users);
        }
        
        // 渲染用户列表
        function renderUsers(users) {
            const tableBody = document.getElementById('users-table');
            tableBody.innerHTML = '';
            
            users.forEach(user => {
                const row = document.createElement('tr');
                
                // 设置角色显示
                const roleText = user.role === 'admin' ? '系统管理员' : '普通工作人员';
                const roleClass = user.role === 'admin' ? 'text-primary font-medium' : 'text-gray-600';
                
                // 设置状态显示
                const statusText = user.status === 'active' ? '启用' : '禁用';
                const statusClass = user.status === 'active' ? 'text-green-600' : 'text-gray-500';
                
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${user.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${user.username}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${user.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm ${roleClass}">${roleText}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm ${statusClass}">${statusText}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button class="edit-user text-primary hover:text-blue-700 mr-3" data-id="${user.id}">
                            <i class="fa fa-pencil"></i> 编辑
                        </button>
                        <button class="toggle-user-status text-warning hover:text-yellow-700 mr-3" data-id="${user.id}" data-status="${user.status}">
                            <i class="fa ${user.status === 'active' ? 'fa-ban' : 'fa-check-circle'}"></i> ${user.status === 'active' ? '禁用' : '启用'}
                        </button>
                        ${user.role !== 'admin' ? `
                            <button class="delete-user text-danger hover:text-red-700" data-id="${user.id}">
                                <i class="fa fa-trash"></i> 删除
                            </button>
                        ` : '<span class="text-gray-400">系统默认</span>'}
                    </td>
                `;
                
                tableBody.appendChild(row);
            });
            
            // 添加编辑、删除和状态切换事件监听器
            addUserEventListeners();
        }
        
        // 添加用户事件监听器
        function addUserEventListeners() {
            // 编辑按钮点击事件
            document.querySelectorAll('.edit-user').forEach(button => {
                button.addEventListener('click', function() {
                    const userId = parseInt(this.getAttribute('data-id'));
                    editUser(userId);
                });
            });
            
            // 删除按钮点击事件
            document.querySelectorAll('.delete-user').forEach(button => {
                button.addEventListener('click', function() {
                    const userId = parseInt(this.getAttribute('data-id'));
                    deleteUser(userId);
                });
            });
            
            // 状态切换按钮点击事件
            document.querySelectorAll('.toggle-user-status').forEach(button => {
                button.addEventListener('click', function() {
                    const userId = parseInt(this.getAttribute('data-id'));
                    const currentStatus = this.getAttribute('data-status');
                    toggleUserStatus(userId, currentStatus);
                });
            });
        }
        
        // 打开添加用户弹窗
        document.getElementById('add-user-button').addEventListener('click', function() {
            document.getElementById('modal-title').textContent = '添加用户';
            document.getElementById('user-id').value = '';
            document.getElementById('user-username').value = '';
            document.getElementById('user-name').value = '';
            document.getElementById('user-password').value = '';
            document.getElementById('user-role').value = 'staff';
            document.getElementById('password-hint').textContent = '密码长度至少6位';
            document.getElementById('user-modal').classList.remove('hidden');
        });
        
        // 关闭弹窗
        document.getElementById('close-modal').addEventListener('click', function() {
            document.getElementById('user-modal').classList.add('hidden');
        });
        
        document.getElementById('cancel-button').addEventListener('click', function() {
            document.getElementById('user-modal').classList.add('hidden');
        });
        
        document.getElementById('modal-overlay').addEventListener('click', function() {
            document.getElementById('user-modal').classList.add('hidden');
        });
        
        // 编辑用户
        function editUser(userId) {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.id === userId);
            
            if (user) {
                document.getElementById('modal-title').textContent = '编辑用户';
                document.getElementById('user-id').value = user.id;
                document.getElementById('user-username').value = user.username;
                document.getElementById('user-name').value = user.name;
                document.getElementById('user-password').value = '';
                document.getElementById('user-role').value = user.role;
                document.getElementById('password-hint').textContent = '留空表示不修改密码';
                document.getElementById('user-modal').classList.remove('hidden');
            }
        }
        
        // 删除用户
        function deleteUser(userId) {
            if (confirm('确定要删除该用户吗？')) {
                let users = JSON.parse(localStorage.getItem('users')) || [];
                users = users.filter(u => u.id !== userId);
                localStorage.setItem('users', JSON.stringify(users));
                renderUsers(users);
            }
        }
        
        // 切换用户状态
        function toggleUserStatus(userId, currentStatus) {
            let users = JSON.parse(localStorage.getItem('users')) || [];
            users = users.map(user => {
                if (user.id === userId) {
                    return {
                        ...user,
                        status: currentStatus === 'active' ? 'inactive' : 'active'
                    };
                }
                return user;
            });
            localStorage.setItem('users', JSON.stringify(users));
            renderUsers(users);
        }
        
        // 提交用户表单
        document.getElementById('user-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const form = e.target;
            const id = form['user-id'].value;
            const username = form['user-username'].value;
            const name = form['user-name'].value;
            const password = form['user-password'].value;
            const role = form['user-role'].value;
            
            // 验证用户名
            if (!username) {
                alert('请输入用户名');
                return;
            }
            
            // 验证姓名
            if (!name) {
                alert('请输入姓名');
                return;
            }
            
            // 验证密码（添加时必填，编辑时可选）
            if (!id && !password) {
                alert('请输入密码');
                return;
            }
            
            // 验证密码长度
            if (password && password.length < 6) {
                alert('密码长度至少6位');
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('users')) || [];
            
            if (id) {
                // 编辑现有用户
                const userIndex = users.findIndex(u => u.id === parseInt(id));
                if (userIndex !== -1) {
                    users[userIndex] = {
                        ...users[userIndex],
                        username,
                        name,
                        role,
                        ...(password ? { password } : {})
                    };
                }
            } else {
                // 检查用户名是否已存在
                if (users.some(u => u.username === username)) {
                    alert('用户名已存在');
                    return;
                }
                
                // 添加新用户
                const newId = users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 1;
                users.push({
                    id: newId,
                    username,
                    name,
                    password,
                    role,
                    status: 'active'
                });
            }
            
            localStorage.setItem('users', JSON.stringify(users));
            document.getElementById('user-modal').classList.add('hidden');
            renderUsers(users);
        });
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            if (checkUserLogin()) {
                initUsers();
            }
        });
    </script>
</body>
</html>
